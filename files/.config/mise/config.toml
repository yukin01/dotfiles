[tools]
# Language runtimes
deno = "2.6"
node = "24"
ruby = "3.4"
bun = "latest"
go = "latest"
uv = "latest"

# JS package managers
"npm:pnpm" = "latest"
"npm:yarn" = "latest"

# Kubernetes
argo-rollouts = "1.8"
argocd = "3.2"
helm = "3.19"
kubectl = "1.33"
kustomize = "5.8"
dyff = "latest"
k9s = "latest"
kind = "latest"
kube-score = "latest"
kubeconform = "latest"
kubectx = "latest"
kubens = "latest"
pluto = "latest"
skaffold = "latest"
trivy = "latest"
"github:awslabs/eks-node-viewer" = { version = "latest", bin = "eks-node-viewer" }

# IaC / Infra
sops = "latest"
terraform-docs = "latest"
tflint = "latest"
tfupdate = "latest"
"github:datadog-labs/pup" = "latest"
"github:tofuutils/tenv" = "latest"

# CI / Lint
act = "latest"
actionlint = "latest"
hadolint = "latest"
pinact = "latest"
shellcheck = "latest"
zizmor = "latest"

# Git tools
delta = "latest"
gh = "latest"
ghq = "latest"
lazygit = "latest"

# CLI utilities
bat = "latest"
fd = "latest"
fx = "latest"
jnv = "latest"
jq = "latest"
peco = "latest"
ripgrep = "latest"
yazi = "latest"
yq = "latest"

# npm packages
"npm:@google/gemini-cli" = "latest"
"npm:@marp-team/marp-cli" = "latest"
"npm:aws-cdk" = "latest"
"npm:ccusage" = "latest"
"npm:firebase-tools" = "latest"
"npm:prettier" = "latest"
"npm:serverless" = "latest"

# pipx packages
"pipx:ansible-core" = "latest"

[settings]
experimental = true

[settings.pipx]
uvx = true
