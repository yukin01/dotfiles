onboarding = false

[theme]
name = "dracula"
auto_switch = false

[terminal]
default_shell = "/opt/homebrew/bin/zsh"
shell_mode = "auto"
new_cwd = "follow"

[ui]
sidebar_width = 34
sidebar_max_width = 44
confirm_close = true
prompt_new_tab_name = false
pane_borders = true
pane_gaps = true
show_agent_labels_on_pane_borders = true
agent_panel_sort = "spaces"

[ui.sidebar.agents]
row_gap = 0

[ui.sidebar.spaces]
row_gap = 1

[ui.toast]
delivery = "terminal"

[keys]
# 組み込みの worktree 削除 (herdr 標準の確認 UI 付き)。branch は残るので git 側で削除する
remove_worktree = "prefix+shift+a"

# lazygit をワンキーで起動
[[keys.command]]
key = "prefix+f"
type = "popup"
command = "lazygit"
description = "lazygit"

# 現在の workspace に nvim/shell/claude レイアウトのタブを追加
[[keys.command]]
key = "prefix+t"
type = "shell"
command = "~/dotfiles/bin/herdr-open"
description = "new layout tab"

# 現在のリポジトリから worktree を作り、レイアウト付き workspace で開く
# (一時ペインで branch 名を入力)
[[keys.command]]
key = "prefix+a"
type = "popup"
command = "~/dotfiles/bin/herdr-open -w"
description = "new worktree (layout)"

[experimental]
switch_ascii_input_source_in_prefix = true
pane_history = true
